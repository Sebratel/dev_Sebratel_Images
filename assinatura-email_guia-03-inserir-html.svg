<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="'Poppins','Segoe UI',Arial,sans-serif">
  <defs>
    <filter id="s3shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <marker id="s3arrow" markerWidth="14" markerHeight="14" refX="7" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#E30613"/>
    </marker>
  </defs>

  <rect width="900" height="500" rx="20" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>

  <circle cx="60" cy="62" r="32" fill="#F59E0B"/>
  <text x="60" y="75" font-size="36" font-weight="800" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="110" y="60" font-size="27" font-weight="800" fill="#111827">Clique no botão</text>
  <text x="110" y="90" font-size="27" font-weight="800" fill="#111827">Inserir HTML</text>

  <rect x="70" y="150" width="760" height="200" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2" filter="url(#s3shadow)"/>
  <text x="100" y="195" font-size="15" fill="#9AA0A6">Digite sua assinatura aqui...</text>

  <line x1="70" y1="278" x2="830" y2="278" stroke="#E5E7EB" stroke-width="1.5"/>

  <rect x="96" y="298" width="46" height="40" rx="8" fill="#E8F0FE" stroke="#1A73E8" stroke-width="2.5"/>
  <text x="119" y="325" font-size="20" font-weight="700" fill="#1A73E8" text-anchor="middle">&lt;/&gt;</text>

  <text x="170" y="325" font-size="15" fill="#5F6368">Sans Serif  ▾</text>
  <text x="300" y="325" font-size="18" font-weight="800" fill="#5F6368">T</text>
  <text x="345" y="325" font-size="17" font-weight="800" fill="#5F6368">B</text>
  <text x="380" y="325" font-size="17" font-weight="800" font-style="italic" fill="#5F6368">I</text>
  <text x="420" y="325" font-size="16" fill="#5F6368">A ▾</text>
  <text x="470" y="325" font-size="16" fill="#5F6368">🔗  🖼  ▤  ▦</text>

  <path d="M 210 430 Q 150 430 122 348" stroke="#E30613" stroke-width="4.5" fill="none" marker-end="url(#s3arrow)"/>
  <text x="150" y="455" font-size="16" fill="#374151">Esse é o botão <tspan font-weight="700" fill="#1A73E8">&lt;/&gt;</tspan> que a extensão HTMaiL adiciona.</text>
</svg>
