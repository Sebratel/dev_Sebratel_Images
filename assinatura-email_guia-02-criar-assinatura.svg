<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="'Poppins','Segoe UI',Arial,sans-serif">
  <defs>
    <filter id="s2shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <marker id="s2arrow" markerWidth="14" markerHeight="14" refX="7" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#E30613"/>
    </marker>
  </defs>

  <rect width="900" height="500" rx="20" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>

  <circle cx="60" cy="62" r="32" fill="#F59E0B"/>
  <text x="60" y="75" font-size="36" font-weight="800" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="110" y="60" font-size="27" font-weight="800" fill="#111827">No Gmail, crie uma nova</text>
  <text x="110" y="90" font-size="27" font-weight="800" fill="#111827">assinatura</text>

  <rect x="70" y="118" width="760" height="52" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="90" y="150" font-size="15" fill="#92400E" font-weight="600">⚙️ Configurações → Ver todas as configurações → Geral → Assinatura</text>

  <rect x="70" y="192" width="760" height="228" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2" filter="url(#s2shadow)"/>
  <text x="100" y="232" font-size="17" font-weight="700" fill="#202124">Assinatura:</text>
  <text x="100" y="256" font-size="13" fill="#5F6368">(incluída no final de todas</text>
  <text x="100" y="274" font-size="13" fill="#5F6368">as mensagens enviadas)</text>

  <rect x="300" y="222" width="250" height="120" rx="8" fill="#FFFFFF" stroke="#DADCE0" stroke-width="1.5"/>
  <rect x="300" y="222" width="250" height="40" fill="#E8F0FE"/>
  <text x="320" y="247" font-size="15" fill="#202124">Assinatura_Erick</text>
  <text x="512" y="248" font-size="16" fill="#5F6368">✎  🗑</text>

  <rect x="300" y="358" width="200" height="44" rx="8" fill="#FFFFFF" stroke="#1A73E8" stroke-width="2"/>
  <text x="400" y="386" font-size="16" font-weight="700" fill="#1A73E8" text-anchor="middle">+  Criar novo</text>

  <path d="M 620 400 Q 540 405 505 390" stroke="#E30613" stroke-width="4.5" fill="none" marker-end="url(#s2arrow)"/>
  <text x="580" y="440" font-size="16" fill="#374151">Clique em <tspan font-weight="700">Criar novo</tspan> e dê um nome.</text>
</svg>
